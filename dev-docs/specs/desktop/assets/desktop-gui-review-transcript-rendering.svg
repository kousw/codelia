<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Desktop GUI review: transcript rendering</title>
  <desc id="desc">Compares string-built HTML transcript rows with typed React row components.</desc>
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f7a4d"/>
    </marker>
    <style>
      .bg { fill: #f7f8f5; }
      .bad { fill: #fff8ed; stroke: #efc47d; stroke-width: 2; }
      .good { fill: #f4fbf7; stroke: #acd8be; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #cfd6cd; stroke-width: 1.5; }
      .warn { fill: #fff1db; stroke: #e1a246; stroke-width: 1.5; }
      .ok { fill: #eef9f2; stroke: #91c9aa; stroke-width: 1.5; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2720; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #606a62; }
      .section { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263126; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263126; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #854d0e; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5e675e; }
      .badnote { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9a3412; }
      .goodnote { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16643c; }
      .line-bad { stroke: #b45309; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
      .line-good { stroke: #1f7a4d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="48" y="52">Transcript Rendering: String Templates vs Typed Rows</text>
  <text class="subtitle" x="48" y="82">Keep tool and reasoning disclosures as structured UI, not injected HTML.</text>

  <rect class="bad" x="48" y="120" width="520" height="540" rx="18"/>
  <text class="section" x="78" y="158">Current renderer</text>
  <text class="subtitle" x="78" y="182">Projection returns HTML strings.</text>

  <rect class="warn" x="88" y="228" width="190" height="82" rx="12"/>
  <text class="label" x="112" y="255">buildAssistantRows</text>
  <text class="mono" x="110" y="280">kind: "html"</text>

  <rect class="warn" x="330" y="228" width="190" height="82" rx="12"/>
  <text class="label" x="359" y="255">AssistantTurn</text>
  <text class="mono" x="350" y="280">innerHTML = row.html</text>

  <path class="line-bad" d="M 278 269 L 326 269"/>

  <rect class="card" x="115" y="376" width="380" height="130" rx="14"/>
  <text class="label" x="148" y="405">Behavior leaks into DOM selectors</text>
  <text class="small" x="148" y="432">copy buttons use data-action queries</text>
  <text class="small" x="148" y="458">disclosure motion uses querySelector</text>
  <text class="small" x="148" y="484">accessibility and tests cross string boundaries</text>

  <path class="line-bad dash" d="M 425 310 C 425 350 382 352 360 374"/>
  <text class="badnote" x="110" y="590">Problem: row structure is hard to type, test, and evolve.</text>

  <rect class="good" x="632" y="120" width="520" height="540" rx="18"/>
  <text class="section" x="662" y="158">Target renderer</text>
  <text class="subtitle" x="662" y="182">Projection returns typed row data.</text>

  <rect class="ok" x="670" y="220" width="160" height="58" rx="12"/>
  <text class="label" x="708" y="246">markdown</text>
  <text class="small" x="698" y="266">ReactMarkdown</text>

  <rect class="ok" x="850" y="220" width="160" height="58" rx="12"/>
  <text class="label" x="901" y="246">tool</text>
  <text class="small" x="887" y="266">ToolRow</text>

  <rect class="ok" x="1030" y="220" width="90" height="58" rx="12"/>
  <text class="label" x="1051" y="246">UI</text>
  <text class="small" x="1047" y="266">panel</text>

  <rect class="ok" x="720" y="330" width="160" height="58" rx="12"/>
  <text class="label" x="758" y="356">reasoning</text>
  <text class="small" x="757" y="376">ReasoningRow</text>

  <rect class="ok" x="900" y="330" width="160" height="58" rx="12"/>
  <text class="label" x="931" y="356">read_group</text>
  <text class="small" x="936" y="376">ReadGroupRow</text>

  <rect class="card" x="760" y="470" width="300" height="82" rx="14"/>
  <text class="label" x="812" y="500">Assistant timeline</text>
  <text class="small" x="808" y="523">typed components own actions and state</text>

  <path class="line-good" d="M 750 278 C 750 424 840 420 870 468"/>
  <path class="line-good" d="M 930 278 C 930 424 905 420 900 468"/>
  <path class="line-good" d="M 1075 278 C 1075 424 990 420 950 468"/>
  <path class="line-good" d="M 800 388 C 800 430 840 438 880 468"/>
  <path class="line-good" d="M 980 388 C 980 430 950 438 925 468"/>

  <text class="goodnote" x="705" y="590">Benefit: safer rendering, focused components, clearer tests.</text>
</svg>
