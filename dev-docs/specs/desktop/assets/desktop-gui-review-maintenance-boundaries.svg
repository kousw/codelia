<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Desktop GUI review: maintenance boundaries</title>
  <desc id="desc">Shows unbounded runtime retention and large feature-cluster components, with target lifecycle and component boundaries.</desc>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b42318"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f7a4d"/>
    </marker>
    <style>
      .bg { fill: #f7f8f5; }
      .panel { fill: #ffffff; stroke: #d8ddd4; stroke-width: 2; }
      .bad { fill: #fff7f5; stroke: #f0b8ad; stroke-width: 2; }
      .good { fill: #f4fbf7; stroke: #acd8be; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #cfd6cd; stroke-width: 1.5; }
      .warn { fill: #fff1eb; stroke: #e3a08d; stroke-width: 1.5; }
      .ok { fill: #eef9f2; stroke: #91c9aa; stroke-width: 1.5; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2720; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #606a62; }
      .section { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263126; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263126; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5e675e; }
      .badnote { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9a3412; }
      .goodnote { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #16643c; }
      .line-bad { stroke: #b42318; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .line-good { stroke: #1f7a4d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="48" y="52">Maintenance Boundaries: Lifecycle and Component Shape</text>
  <text class="subtitle" x="48" y="82">The MVP shape works, but long-lived desktop behavior needs explicit boundaries.</text>

  <rect class="bad" x="48" y="120" width="520" height="540" rx="18"/>
  <text class="section" x="78" y="158">Current accumulation</text>
  <text class="subtitle" x="78" y="182">Resources and features grow without clear exit points.</text>

  <rect class="warn" x="95" y="230" width="190" height="86" rx="12"/>
  <text class="label" x="128" y="258">RuntimeClient</text>
  <text class="small" x="122" y="281">per workspace</text>
  <text class="small" x="119" y="301">no dispose policy</text>

  <rect class="warn" x="330" y="230" width="190" height="86" rx="12"/>
  <text class="label" x="366" y="258">RunRecord</text>
  <text class="small" x="361" y="281">event arrays</text>
  <text class="small" x="353" y="301">no pruning policy</text>

  <path class="line-bad" d="M 286 273 L 326 273"/>

  <rect class="warn" x="95" y="400" width="190" height="86" rx="12"/>
  <text class="label" x="137" y="428">Composer</text>
  <text class="small" x="117" y="451">input + menus + model</text>
  <text class="small" x="128" y="471">one feature cluster</text>

  <rect class="warn" x="330" y="400" width="190" height="86" rx="12"/>
  <text class="label" x="357" y="428">GeneratedUiPanel</text>
  <text class="small" x="354" y="451">all node families</text>
  <text class="small" x="371" y="471">one switch file</text>

  <text class="badnote" x="95" y="590">Problem: growth becomes accidental product behavior.</text>

  <rect class="good" x="632" y="120" width="520" height="540" rx="18"/>
  <text class="section" x="662" y="158">Target boundaries</text>
  <text class="subtitle" x="662" y="182">Lifecycle and feature ownership are explicit.</text>

  <rect class="ok" x="680" y="218" width="180" height="78" rx="12"/>
  <text class="label" x="706" y="246">Runtime pool</text>
  <text class="small" x="709" y="269">last used + active</text>
  <text class="small" x="709" y="287">dispose idle clients</text>

  <rect class="ok" x="920" y="218" width="180" height="78" rx="12"/>
  <text class="label" x="954" y="246">Run buffers</text>
  <text class="small" x="950" y="269">bounded recent live</text>
  <text class="small" x="953" y="287">reconcile on finish</text>

  <path class="line-good" d="M 860 257 L 916 257"/>

  <rect class="ok" x="690" y="382" width="120" height="62" rx="10"/>
  <text class="label" x="719" y="407">Input</text>
  <text class="small" x="711" y="428">textarea</text>
  <rect class="ok" x="830" y="382" width="120" height="62" rx="10"/>
  <text class="label" x="859" y="407">Modes</text>
  <text class="small" x="852" y="428">/ $ !</text>
  <rect class="ok" x="970" y="382" width="120" height="62" rx="10"/>
  <text class="label" x="1000" y="407">Model</text>
  <text class="small" x="992" y="428">pickers</text>

  <rect class="ok" x="690" y="472" width="120" height="62" rx="10"/>
  <text class="label" x="716" y="497">Table</text>
  <text class="small" x="716" y="518">node</text>
  <rect class="ok" x="830" y="472" width="120" height="62" rx="10"/>
  <text class="label" x="858" y="497">Chart</text>
  <text class="small" x="856" y="518">node</text>
  <rect class="ok" x="970" y="472" width="120" height="62" rx="10"/>
  <text class="label" x="998" y="497">Graph</text>
  <text class="small" x="995" y="518">node</text>

  <text class="goodnote" x="690" y="590">Benefit: long-lived app behavior is deliberate and easier to extend.</text>
</svg>
